version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: chwrs_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: chwrs_db
      MYSQL_USER: chwrs_user
      MYSQL_PASSWORD: chwrs_password_123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - chwrs_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chwrs_backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: chwrs_db
      DB_USER: chwrs_user
      DB_PASSWORD: chwrs_password_123
      JWT_SECRET: your_jwt_secret_key_change_in_production
      SESSION_SECRET: your_session_secret_change_in_production
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - chwrs_network
    restart: unless-stopped

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chwrs_frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - chwrs_network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  chwrs_network:
    driver: bridge
